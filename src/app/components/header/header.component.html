<!-- Announcement Banner -->
<div class="bg-gray-900 text-white text-center py-2 px-4 text-sm font-medium">
  <span>🎉 Summer Sale! Get up to <strong>40% OFF</strong> on selected items. Free delivery on orders over 500 ETB &nbsp;|&nbsp;</span>
  <a href="#" class="underline hover:text-red-400 transition-colors">Shop Now →</a>
</div>

<header class="bg-white shadow-sm sticky top-0 z-50">
  <!-- Top bar -->
  <div class="container mx-auto px-4 lg:px-6">
    <div class="flex items-center justify-between h-16 md:h-20">
      <!-- Logo -->
      <div class="flex-shrink-0">
        <a routerLink="/home" class="flex items-center gap-2 hover:opacity-90 transition-opacity">
          <img src="../../../assets/images/logo.png" alt="Merkato Gebeya Logo" class="h-10 md:h-14 w-auto">
        </a>
      </div>

      <!-- Desktop Search Bar -->
      <div class="hidden md:flex flex-1 max-w-xl mx-8">
        <div class="relative w-full">
          <input
            type="text"
            [(ngModel)]="searchQuery"
            (keyup.enter)="onSearch()"
            placeholder="Search products, brands and categories..."
            class="w-full pl-5 pr-12 py-2.5 border-2 border-gray-200 rounded-full text-sm focus:outline-none focus:border-red-400 transition-colors"
          >
          <button (click)="onSearch()" class="absolute right-1 top-1/2 -translate-y-1/2 bg-red-500 hover:bg-red-600 text-white w-9 h-9 rounded-full flex items-center justify-center transition-colors">
            <i class="fas fa-search text-sm"></i>
          </button>
        </div>
      </div>

      <!-- Desktop Navigation -->
      <nav class="hidden md:flex items-center space-x-6 text-sm font-medium">
        <a routerLink="/home" routerLinkActive="text-red-500 font-semibold" class="text-gray-600 hover:text-red-500 transition-colors">Home</a>
        <a routerLink="/contact-us" routerLinkActive="text-red-500 font-semibold" class="text-gray-600 hover:text-red-500 transition-colors">Contact</a>
        <a routerLink="/about-us" routerLinkActive="text-red-500 font-semibold" class="text-gray-600 hover:text-red-500 transition-colors">About</a>
        <a routerLink="/sign-in" routerLinkActive="text-red-500 font-semibold" class="text-gray-600 hover:text-red-500 transition-colors">Sign In</a>
        <a routerLink="/sign-up" class="btn-primary text-sm py-2 px-4 rounded-full">Sign Up</a>
      </nav>

      <!-- Right Icons -->
      <div class="flex items-center space-x-3 ml-4 md:ml-0">
        <!-- Wishlist -->
        <a routerLink="/wishlist" class="relative p-2 text-gray-600 hover:text-red-500 transition-colors group">
          <i class="far fa-heart text-xl"></i>
          <span *ngIf="wishlistCount > 0" class="absolute -top-0.5 -right-0.5 bg-red-500 text-white text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full shadow">
            {{ wishlistCount }}
          </span>
        </a>

        <!-- Cart -->
        <a routerLink="/cart" class="relative p-2 text-gray-600 hover:text-red-500 transition-colors">
          <i class="fas fa-shopping-bag text-xl"></i>
          <span *ngIf="cartCount > 0" class="absolute -top-0.5 -right-0.5 bg-red-500 text-white text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full shadow">
            {{ cartCount }}
          </span>
        </a>

        <!-- Profile -->
        <a routerLink="/profile" class="relative p-2 text-gray-600 hover:text-red-500 transition-colors">
          <i class="far fa-user-circle text-xl"></i>
          <span *ngIf="profileNotifications > 0" class="absolute -top-0.5 -right-0.5 bg-red-500 text-white text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full shadow">
            {{ profileNotifications }}
          </span>
        </a>

        <!-- Hamburger (mobile) -->
        <button (click)="toggleMobileMenu()" class="md:hidden p-2 text-gray-600 hover:text-red-500 transition-colors">
          <i [class]="mobileMenuOpen ? 'fas fa-times text-xl' : 'fas fa-bars text-xl'"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div *ngIf="mobileMenuOpen" class="md:hidden bg-white border-t border-gray-100 shadow-lg">
    <!-- Mobile Search -->
    <div class="px-4 py-3">
      <div class="relative">
        <input
          type="text"
          placeholder="Search products..."
          class="w-full pl-4 pr-10 py-2.5 border-2 border-gray-200 rounded-full text-sm focus:outline-none focus:border-red-400"
        >
        <button class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-red-500">
          <i class="fas fa-search text-sm"></i>
        </button>
      </div>
    </div>
    <!-- Mobile Nav Links -->
    <nav class="px-4 pb-4 space-y-1">
      <a routerLink="/home" (click)="toggleMobileMenu()" class="flex items-center gap-3 py-2.5 px-3 rounded-lg text-gray-700 hover:bg-red-50 hover:text-red-500 font-medium transition-colors">
        <i class="fas fa-home w-5 text-center"></i> Home
      </a>
      <a routerLink="/contact-us" (click)="toggleMobileMenu()" class="flex items-center gap-3 py-2.5 px-3 rounded-lg text-gray-700 hover:bg-red-50 hover:text-red-500 font-medium transition-colors">
        <i class="fas fa-envelope w-5 text-center"></i> Contact
      </a>
      <a routerLink="/about-us" (click)="toggleMobileMenu()" class="flex items-center gap-3 py-2.5 px-3 rounded-lg text-gray-700 hover:bg-red-50 hover:text-red-500 font-medium transition-colors">
        <i class="fas fa-info-circle w-5 text-center"></i> About
      </a>
      <a routerLink="/sign-in" (click)="toggleMobileMenu()" class="flex items-center gap-3 py-2.5 px-3 rounded-lg text-gray-700 hover:bg-red-50 hover:text-red-500 font-medium transition-colors">
        <i class="fas fa-sign-in-alt w-5 text-center"></i> Sign In
      </a>
      <a routerLink="/sign-up" (click)="toggleMobileMenu()" class="flex items-center justify-center gap-2 mt-2 btn-primary w-full rounded-lg">
        <i class="fas fa-user-plus"></i> Create Account
      </a>
    </nav>
  </div>
</header>
