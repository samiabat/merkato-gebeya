<section class="py-10 bg-gray-50">
  <div class="container mx-auto px-4 lg:px-6">

    <!-- Section Header -->
    <div class="flex items-center gap-3 mb-8">
      <span class="w-1 h-8 bg-red-500 rounded-full"></span>
      <div>
        <p class="text-red-500 text-sm font-semibold uppercase tracking-wide">Categories</p>
        <h2 class="text-2xl font-bold text-gray-900">Browse By Category</h2>
      </div>
    </div>

    <!-- Categories Grid -->
    <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-3 md:gap-4">
      <a *ngFor="let cat of categories" href="#"
        class="flex flex-col items-center justify-center gap-3 p-4 rounded-xl border-2 border-gray-200 bg-white hover:border-red-500 hover:bg-red-50 hover:shadow-md transition-all duration-200 group cursor-pointer">
        <div class="w-12 h-12 rounded-full bg-gray-100 group-hover:bg-red-100 flex items-center justify-center transition-colors">
          <i [class]="cat.icon + ' text-xl text-gray-500 group-hover:text-red-500 transition-colors'"></i>
        </div>
        <span class="text-xs font-medium text-gray-700 group-hover:text-red-500 text-center leading-tight transition-colors">{{ cat.name }}</span>
      </a>
    </div>
  </div>
</section>
