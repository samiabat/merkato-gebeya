<section class="py-10 bg-white">
  <div class="container mx-auto px-4 lg:px-6">

    <!-- Section Header -->
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-3">
        <span class="w-1 h-8 bg-red-500 rounded-full"></span>
        <div>
          <p class="text-red-500 text-sm font-semibold uppercase tracking-wide">Featured</p>
          <h2 class="text-2xl font-bold text-gray-900">New Arrivals</h2>
        </div>
      </div>
    </div>

    <!-- Featured Layout -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">

      <!-- Hero Card (left) -->
      <div class="relative rounded-2xl overflow-hidden bg-gray-900 h-64 sm:h-80 lg:h-auto lg:row-span-2 group cursor-pointer">
        <img [src]="heroArrival.image" [alt]="heroArrival.name" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
        <div class="absolute inset-0 bg-gradient-to-t from-gray-900/80 via-transparent to-transparent"></div>
        <div class="absolute bottom-0 left-0 p-6">
          <span class="badge-new mb-2 static">New</span>
          <h3 class="text-white text-xl font-bold mb-1">{{ heroArrival.name }}</h3>
          <p class="text-gray-300 text-sm mb-3">{{ heroArrival.description }}</p>
          <a href="#" class="text-white font-semibold text-sm flex items-center gap-2 hover:gap-3 transition-all">
            Shop Now <i class="fas fa-arrow-right text-xs"></i>
          </a>
        </div>
      </div>

      <!-- Right top cards -->
      <div class="grid grid-cols-2 gap-4">
        <div *ngFor="let item of sideArrivals.slice(0, 2)" class="relative rounded-2xl overflow-hidden h-40 sm:h-52 group cursor-pointer">
          <img [src]="item.image" [alt]="item.name" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
          <div class="absolute inset-0 bg-gradient-to-t from-gray-900/70 via-transparent to-transparent"></div>
          <div class="absolute bottom-0 left-0 p-4">
            <h3 class="text-white text-sm font-bold mb-0.5">{{ item.name }}</h3>
            <a href="#" class="text-gray-300 text-xs flex items-center gap-1 hover:text-white transition-colors">
              Shop <i class="fas fa-arrow-right text-xs"></i>
            </a>
          </div>
        </div>
      </div>

      <!-- Right bottom cards -->
      <div class="grid grid-cols-2 gap-4">
        <div *ngFor="let item of sideArrivals.slice(2, 4)" class="relative rounded-2xl overflow-hidden h-40 sm:h-52 group cursor-pointer">
          <img [src]="item.image" [alt]="item.name" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
          <div class="absolute inset-0 bg-gradient-to-t from-gray-900/70 via-transparent to-transparent"></div>
          <div class="absolute bottom-0 left-0 p-4">
            <h3 class="text-white text-sm font-bold mb-0.5">{{ item.name }}</h3>
            <a href="#" class="text-gray-300 text-xs flex items-center gap-1 hover:text-white transition-colors">
              Shop <i class="fas fa-arrow-right text-xs"></i>
            </a>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
