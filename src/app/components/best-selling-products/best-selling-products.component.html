<section class="py-10 bg-white">
  <div class="container mx-auto px-4 lg:px-6">

    <!-- Section Header -->
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-3">
        <span class="w-1 h-8 bg-red-500 rounded-full"></span>
        <div>
          <p class="text-red-500 text-sm font-semibold uppercase tracking-wide">This Month</p>
          <h2 class="text-2xl font-bold text-gray-900">Best Selling Products</h2>
        </div>
      </div>
      <a href="#" class="btn-outline text-sm rounded-full hidden sm:flex">View All</a>
    </div>

    <!-- Products Grid -->
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 lg:gap-6">
      <div *ngFor="let product of bestSellingProducts" class="product-card">
        <div class="relative overflow-hidden bg-gray-50">
          <img [src]="product.image" [alt]="product.name" class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-300">
          <span *ngIf="product.badge" [class]="product.badgeColor + ' absolute top-3 left-3 text-white text-xs font-semibold px-2 py-1 rounded-md'">
            {{ product.badge }}
          </span>
          <div class="absolute top-3 right-3 flex flex-col gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-200">
            <button class="w-8 h-8 bg-white rounded-full shadow-md flex items-center justify-center hover:bg-red-500 hover:text-white transition-colors">
              <i class="fas fa-heart text-xs"></i>
            </button>
          </div>
        </div>
        <div class="p-4">
          <h3 class="text-sm font-semibold text-gray-800 mb-1 line-clamp-1">{{ product.name }}</h3>
          <p class="text-xs text-gray-500 mb-2 line-clamp-1">{{ product.category }}</p>
          <div class="flex items-center gap-2 mb-2">
            <span class="text-red-500 font-bold">${{ product.price }}</span>
            <span *ngIf="product.originalPrice" class="text-gray-400 text-sm line-through">${{ product.originalPrice }}</span>
          </div>
          <div class="flex items-center gap-1 mb-3">
            <div class="flex text-yellow-400 text-xs">
              <i *ngFor="let s of getStars(product.rating)" [class]="s"></i>
            </div>
            <span class="text-xs text-gray-500">({{ product.reviews }})</span>
          </div>
          <button class="w-full bg-gray-900 hover:bg-red-500 text-white text-sm py-2 rounded-lg font-medium transition-colors">
            Add to Cart
          </button>
        </div>
      </div>
    </div>

    <!-- Mobile View All -->
    <div class="flex justify-center mt-6 sm:hidden">
      <a href="#" class="btn-outline rounded-full">View All Products</a>
    </div>
  </div>
</section>
